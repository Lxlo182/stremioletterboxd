services:
  - type: web
    name: stremio-letterboxd
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stremio-letterboxd-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: stremio-letterboxd-db
    plan: free
